<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>T-Tube</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
</head>

<body>

    <header id="header">
        <div class="logo">T-<span>Tube</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search videos...">
            <button onclick="searchVideos()"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <main id="main-content"></main>

    <!-- Shorts Fullscreen Player -->
    <div id="shorts-fullscreen-container" class="hidden">
        <button class="close-shorts-btn" onclick="closeShorts()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div id="shorts-wrapper"></div>
    </div>

    <!-- Long Video Player Overlay -->
    <div id="video-player-overlay" class="hidden">
        <div class="player-container" id="playerContainer">
            <button class="player-back-btn" onclick="closePlayer()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <video id="longVideoPlayer" playsinline></video>
            <!-- Buffering Spinner -->
            <div id="player-spinner" class="player-spinner hidden">
                <i class="fas fa-circle-notch fa-spin"></i>
            </div>
            <!-- Seek Indicators -->
            <div id="seek-left" class="seek-indicator seek-left">
                <i class="fas fa-backward"></i><span>-10s</span>
            </div>
            <div id="seek-right" class="seek-indicator seek-right">
                <i class="fas fa-forward"></i><span>+10s</span>
            </div>
        </div>

        <div class="player-video-details">
            <h2 id="playerVideoTitle"></h2>
            <p id="playerVideoViews"></p>
        </div>

        <div class="related-section">
            <h3 class="section-header"><i class="fas fa-play-circle"></i> Up Next</h3>
            <div id="related-videos-container"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="loadHome()"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="loadTrendingTab()"><i class="fas fa-fire"></i><span>Trending</span></div>
        <div class="nav-item" onclick="loadShortsTab()"><i class="fas fa-sync-alt theme-cyan"></i><span>Scrolls</span></div>
        <div class="nav-item" onclick="loadCategoriesTab()"><i class="fas fa-th-large"></i><span>Categories</span></div>
        <!-- Admin link removed -->
    </nav>

    <script src="script.js"></script>
</body>
</html>
