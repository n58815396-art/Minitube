<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minitube</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

    <header id="header">
        <div class="logo">Mini<span>Tube</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search videos...">
            <button onclick="searchVideos()"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <main id="main-content">
        </main>

    <div id="shorts-fullscreen-container" class="hidden">
        <button class="close-shorts-btn" onclick="closeShorts()"><i class="fas fa-arrow-left"></i></button>
        <div id="shorts-wrapper"></div>
    </div>

    <div id="video-player-overlay" class="hidden">
        <div class="player-container" id="playerContainer">
            <video id="longVideoPlayer" playsinline></video>
            
            <div id="loadingSpinner" class="spinner hidden"><i class="fas fa-circle-notch fa-spin"></i></div>
            
            <div id="rewindIndicator" class="tap-indicator left"><i class="fas fa-backward"></i> 10s</div>
            <div id="forwardIndicator" class="tap-indicator right"><i class="fas fa-forward"></i> 10s</div>

            <div id="playerControls" class="player-controls">
                <button class="close-player-btn" onclick="closePlayer()"><i class="fas fa-times"></i></button>
                
                <div class="controls-bottom">
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar-bg"></div>
                        <div class="progress-bar-buffer" id="bufferBar"></div>
                        <div class="progress-bar-fill" id="progressBar"></div>
                    </div>
                    
                    <div class="control-actions">
                        <div class="left-controls">
                            <button id="playPauseBtn"><i class="fas fa-pause"></i></button>
                            <span id="timeDisplay">0:00 / 0:00</span>
                        </div>
                        <div class="right-controls">
                            <button id="muteBtn"><i class="fas fa-volume-up"></i></button>
                            <button id="fullscreenBtn"><i class="fas fa-expand"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="player-video-details">
            <h2 id="playerVideoTitle">Video Title</h2>
            <p id="playerVideoViews">0 views</p>
        </div>
    </div>

        <nav class="bottom-nav">
        <div class="nav-item active" onclick="loadHome()"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="loadShortsTab()"><i class="fas fa-bolt"></i><span>Shorts</span></div>
        <div class="nav-item" onclick="loadCategoriesTab()"><i class="fas fa-th-large"></i><span>Categories</span></div>
        
        <div class="nav-item hidden" id="adminNavBtn" onclick="window.location.href='/admin'"><i class="fas fa-cog"></i><span>Admin</span></div>
    </nav>


    <script src="script.js"></script>
</body>
</html>
