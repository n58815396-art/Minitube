<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <title>T-Tube | Premium Streaming</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
</head>

<body>
    <!-- Abstract Background Elements -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <header id="header">
        <div class="header-inner">
            <div class="logo">T-<span>Tube</span></div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search premium content...">
                <button onclick="searchVideos()"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </header>

    <main id="main-content"></main>

    <!-- Shorts Fullscreen Player -->
    <div id="shorts-fullscreen-container" class="hidden">
        <button class="close-shorts-btn" onclick="closeShorts()">
            <i class="fas fa-chevron-left"></i>
        </button>
        <div id="shorts-wrapper"></div>
    </div>

    <!-- Long Video Player Overlay -->
    <div id="video-player-overlay" class="hidden">
        <div class="player-container-wrapper">
            <div class="player-container" id="playerContainer">
                <button class="player-back-btn" onclick="closePlayer()">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <video id="longVideoPlayer" playsinline></video>
                <!-- Buffering Spinner -->
                <div id="player-spinner" class="player-spinner hidden">
                    <div class="glass-loader"></div>
                </div>
                <!-- Seek Indicators -->
                <div id="seek-left" class="seek-indicator seek-left">
                    <i class="fas fa-backward"></i><span>10s</span>
                </div>
                <div id="seek-right" class="seek-indicator seek-right">
                    <i class="fas fa-forward"></i><span>10s</span>
                </div>
            </div>
        </div>

        <div class="player-content-area">
            <div class="player-video-details">
                <h2 id="playerVideoTitle"></h2>
                <div class="v-stats-row">
                    <span id="playerVideoViews"></span>
                    <span class="v-badge">Premium 4K</span>
                </div>
            </div>

            <div class="related-section">
                <h3 class="section-header"><i class="fas fa-bolt"></i> Up Next</h3>
                <div id="related-videos-container"></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-dock">
            <div class="nav-item active" onclick="loadHome()"><i class="fas fa-home"></i><span>Home</span></div>
            <div class="nav-item" onclick="loadTrendingTab()"><i class="fas fa-fire"></i><span>Hot</span></div>
            <div class="nav-item nav-item-special" onclick="loadShortsTab()">
                <div class="special-icon-bg"></div>
                <i class="fas fa-play"></i>
                <span>Scrolls</span>
            </div>
            <div class="nav-item" onclick="loadCategoriesTab()"><i class="fas fa-shapes"></i><span>Browse</span></div>
            <div class="nav-item" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><i class="fas fa-arrow-up"></i><span>Top</span></div>
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
